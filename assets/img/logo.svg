<svg viewBox="0 0 260 148" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Codando na Rede — logo">

  <!-- ── POSTS ── -->
  <rect x="8"   y="4"  width="12" height="122" rx="6" fill="#1e293b"/>
  <rect x="240" y="4"  width="12" height="122" rx="6" fill="#1e293b"/>

  <!-- hooks / rings -->
  <circle cx="14"  cy="38" r="5" fill="#334155"/>
  <circle cx="246" cy="38" r="5" fill="#334155"/>

  <!-- ── ROPES ── -->
  <line x1="14"  y1="38" x2="44"  y2="66" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="246" y1="38" x2="216" y2="66" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ── HAMMOCK ── -->
  <!-- drop shadow -->
  <path d="M 44,68 C 88,122 172,122 216,68 L 216,78 C 172,132 88,132 44,78 Z"
        fill="#0050b3" opacity="0.35"/>
  <!-- fabric -->
  <path d="M 44,64 C 88,116 172,116 216,64 L 216,73 C 172,125 88,125 44,73 Z"
        fill="#007AFF"/>
  <!-- top highlight -->
  <path d="M 44,65 C 88,116 172,116 216,65"
        stroke="rgba(255,255,255,0.22)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ── PERSON — body (dark t-shirt) ── -->
  <path d="M 199,57 C 168,63 118,67 58,60"
        stroke="#0f172a" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M 199,57 C 168,63 118,67 58,60"
        stroke="#1e3a5f" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- ── HEAD ── -->
  <circle cx="210" cy="43" r="15" fill="#d4956b"/>
  <!-- hair -->
  <path d="M 196,35 C 199,25 223,25 225,37 L 219,35 C 214,29 202,29 199,36 Z"
        fill="#1e293b"/>
  <!-- ear -->
  <ellipse cx="196" cy="45" rx="4" ry="5.5" fill="#bf7f55"/>

  <!-- ── ARM + HAND on laptop ── -->
  <path d="M 188,64 C 176,56 160,50 150,48"
        stroke="#bf7f55" stroke-width="8" stroke-linecap="round" fill="none"/>
  <circle cx="150" cy="47" r="5.5" fill="#bf7f55"/>

  <!-- ── LAPTOP ── -->
  <g transform="translate(116, 59) rotate(-7)">
    <!-- screen back -->
    <rect x="0" y="-34" width="56" height="36" rx="3.5" fill="#1e293b"/>
    <!-- display -->
    <rect x="2" y="-32" width="52" height="32" rx="2.5" fill="#080d14"/>
    <!-- subtle glow -->
    <rect x="2" y="-32" width="52" height="32" rx="2.5" fill="#007AFF" opacity="0.07"/>
    <!-- code lines -->
    <rect x="6" y="-27" width="20" height="2.5" rx="1.25" fill="#60a5fa"/>
    <rect x="6" y="-22" width="32" height="2.5" rx="1.25" fill="#4ade80"/>
    <rect x="6" y="-17" width="14" height="2.5" rx="1.25" fill="#fb923c"/>
    <rect x="6" y="-12" width="26" height="2.5" rx="1.25" fill="#60a5fa" opacity="0.65"/>
    <rect x="6"  y="-7" width="18" height="2.5" rx="1.25" fill="#f8fafc" opacity="0.3"/>
    <!-- cursor blink -->
    <rect x="28" y="-7" width="2" height="2.5" rx="1" fill="#f8fafc" opacity="0.7"/>
    <!-- hinge -->
    <rect x="0" y="1" width="56" height="3" rx="1.5" fill="#334155"/>
    <!-- keyboard base -->
    <rect x="-6" y="3" width="68" height="10" rx="5" fill="#1e293b"/>
    <!-- key rows (subtle) -->
    <rect x="2"  y="5"   width="52" height="2"   rx="1" fill="#334155"/>
    <rect x="4"  y="9"   width="48" height="1.5" rx="0.75" fill="#334155"/>
    <!-- touchpad -->
    <rect x="18" y="4.5" width="20" height="6" rx="3" fill="#0f172a"/>
  </g>

  <!-- ── FLOATING CODE DECORATIONS ── -->
  <text x="20"  y="44" font-family="'Courier New',monospace" font-size="12"
        fill="#007AFF" opacity="0.6" font-weight="700">&lt;/&gt;</text>

  <text x="222" y="28" font-family="'Courier New',monospace" font-size="11"
        fill="#30d158" opacity="0.55">{}</text>

  <text x="98"  y="22" font-family="'Courier New',monospace" font-size="9"
        fill="#ff9f0a" opacity="0.5">fn()</text>

  <text x="160" y="18" font-family="'Courier New',monospace" font-size="8"
        fill="#5ac8fa" opacity="0.45">const</text>

  <!-- sparkle dots -->
  <circle cx="62"  cy="18" r="2.2" fill="#60a5fa" opacity="0.45"/>
  <circle cx="185" cy="13" r="1.6" fill="#4ade80" opacity="0.4"/>
  <circle cx="46"  cy="30" r="1.8" fill="#ff9f0a" opacity="0.35"/>
  <circle cx="232" cy="20" r="2"   fill="#60a5fa" opacity="0.3"/>
  <circle cx="140" cy="14" r="1.4" fill="#f8fafc" opacity="0.2"/>
</svg>
